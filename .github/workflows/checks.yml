name: checks

on:
  push:
    paths:
        - pelutils/**.py
        - tests/**.py
        - setup.py
        - .github/workflows
        - .coveragerc

  pull_request:
    paths:
        - pelutils/**.py
        - tests/**.py
        - setup.py
        - .github/workflows
        - .coveragerc

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Set up PyPi dependencies and install package
        run: |
          pip install --upgrade setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .[dev]

      - name: Lint
        run: ruff check pelutils tests

      - name: Format
        run: ruff format --check pelutils tests

      - name: Type check
        # Not checking types on tests
        # Tests often explicitly check behaviour with wrong types, so it would cause many false positives
        run: basedpyright pelutils

      - name: Run test
        run: pytest --cov=pelutils

      - name: Upload coverage data to coveralls.io
        run: coveralls --service=github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
